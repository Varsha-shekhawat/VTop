<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills — Varsha Shekhawat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div class="logo">VTop Portal</div>
    </div>
    <nav class="header-menu">
        <a href="vtop.html">Home</a>
        <a href="about.html">About</a>
        <a href="skill.html" class="active">Skills</a>
        <a href="attendance.html">Attendance</a>
        <a href="marks.html">Marks</a>
        <a href="contact.html">Contact</a>
        <a href="help.html">Help</a>
    </nav>
</header>

<div class="sidebar" id="sidebar">
    <ul>
        <li onclick="go('vtop.html')"><span class="icon">🏠</span><span class="label">Home</span></li>
        <li onclick="go('about.html')"><span class="icon">👤</span><span class="label">About</span></li>
        <li class="active" onclick="go('skill.html')"><span class="icon">🛠</span><span class="label">Skills</span></li>
        <li onclick="go('attendance.html')"><span class="icon">📋</span><span class="label">Attendance</span></li>
        <li onclick="go('marks.html')"><span class="icon">📝</span><span class="label">Marks</span></li>
        <li onclick="go('contact.html')"><span class="icon">📬</span><span class="label">Contact</span></li>
        <li onclick="go('help.html')"><span class="icon">❓</span><span class="label">Help</span></li>
    </ul>
</div>

<div class="main">
    <div class="content-card">
        <h1>My Skills</h1>
        <p class="subtitle">Technologies I work with</p>
        <div class="skills-grid" id="skills-grid">
            <p class="loading-text">Loading skills...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const data = await fetchAPI('skills');
        if (data) {
            const grid = document.getElementById('skills-grid');
            grid.innerHTML = data.map(s => `
                <div class="skill-item">
                    <div class="skill-header">
                        <span class="skill-name">${s.icon} ${s.name}</span>
                        <span class="skill-percent">${s.proficiency}%</span>
                    </div>
                    <div class="skill-bar"><div class="fill" style="width:0%;" data-w="${s.proficiency}%"></div></div>
                </div>
            `).join('');
            // Animate bars
            setTimeout(() => {
                document.querySelectorAll('.skill-bar .fill').forEach(b => { b.style.width = b.dataset.w; });
            }, 100);
        }
    });
</script>
</body>
</html>
