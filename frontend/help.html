<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help — Varsha Shekhawat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div class="logo">VTop Portal</div>
    </div>
    <nav class="header-menu">
        <a href="vtop.html">Home</a>
        <a href="about.html">About</a>
        <a href="skill.html">Skills</a>
        <a href="attendance.html">Attendance</a>
        <a href="marks.html">Marks</a>
        <a href="contact.html">Contact</a>
        <a href="help.html" class="active">Help</a>
    </nav>
</header>

<div class="sidebar" id="sidebar">
    <ul>
        <li onclick="go('vtop.html')"><span class="icon">🏠</span><span class="label">Home</span></li>
        <li onclick="go('about.html')"><span class="icon">👤</span><span class="label">About</span></li>
        <li onclick="go('skill.html')"><span class="icon">🛠</span><span class="label">Skills</span></li>
        <li onclick="go('attendance.html')"><span class="icon">📋</span><span class="label">Attendance</span></li>
        <li onclick="go('marks.html')"><span class="icon">📝</span><span class="label">Marks</span></li>
        <li onclick="go('contact.html')"><span class="icon">📬</span><span class="label">Contact</span></li>
        <li class="active" onclick="go('help.html')"><span class="icon">❓</span><span class="label">Help</span></li>
    </ul>
</div>

<div class="main">
    <div class="content-card">
        <h1>Help & FAQ</h1>
        <p class="subtitle">Common questions answered</p>
        <div class="faq-list" id="faq-list">
            <p class="loading-text">Loading...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const data = await fetchAPI('help');
        if (data && data.length > 0) {
            document.getElementById('faq-list').innerHTML = data.map(item => `
                <div class="faq-item">
                    <h3>${item.question}</h3>
                    <p>${item.answer}</p>
                </div>
            `).join('');
        }
    });
</script>
</body>
</html>
