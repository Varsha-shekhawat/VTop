<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varsha Portfolio - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: #e2e8f0; }

    /* Header */
    header {
        height: 64px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
    .menu-btn { font-size: 22px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: 0.3s; background: rgba(99, 102, 241, 0.1); }
    .menu-btn:hover { background: rgba(99, 102, 241, 0.25); }
    .header-menu { display: flex; gap: 4px; }
    .header-menu a {
        cursor: pointer; font-size: 13px; padding: 8px 14px; border-radius: 8px;
        transition: all 0.3s; color: #94a3b8; text-decoration: none; font-weight: 500;
    }
    .header-menu a:hover { background: rgba(99, 102, 241, 0.15); color: #c7d2fe; }
    .header-menu a.active { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }

    /* Sidebar */
    .sidebar {
        position: fixed; top: 64px; left: 0; width: 68px; height: calc(100vh - 64px);
        background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(12px);
        overflow: hidden; transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        border-right: 1px solid rgba(99, 102, 241, 0.1);
        z-index: 999;
    }
    .sidebar.open { width: 240px; }
    .sidebar ul { list-style: none; padding: 12px 8px; }
    .sidebar li {
        padding: 12px 16px; display: flex; align-items: center; gap: 14px;
        cursor: pointer; white-space: nowrap; transition: all 0.3s;
        border-radius: 10px; margin-bottom: 4px; font-size: 14px; color: #94a3b8;
    }
    .sidebar li:hover { background: rgba(99, 102, 241, 0.15); color: #c7d2fe; }
    .sidebar li.active { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
    .sidebar li .icon { font-size: 18px; min-width: 24px; text-align: center; }
    .sidebar li .label { opacity: 0; transition: opacity 0.2s ease; font-weight: 500; }
    .sidebar.open li .label { opacity: 1; }

    /* Main Content */
    .main {
        margin-top: 64px; margin-left: 68px; padding: 40px;
        min-height: calc(100vh - 64px); display: flex; justify-content: center; align-items: center;
        transition: margin-left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .center-container {
        display: flex; gap: 40px; padding: 48px;
        border-radius: 24px;
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(99, 102, 241, 0.15);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3), 0 0 100px rgba(99, 102, 241, 0.05);
        max-width: 800px; width: 100%;
        animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .frame {
        flex: 1; border-radius: 18px; padding: 32px;
        display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(99, 102, 241, 0.1);
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .frame:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(99, 102, 241, 0.1); }

    .bio h2 {
        margin-bottom: 16px; font-size: 22px; font-weight: 700;
        background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bio p { font-size: 14px; line-height: 1.8; color: #94a3b8; }
    .bio .tag-container { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .bio .tag {
        padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
        background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .photo img {
        width: 200px; height: 200px; object-fit: cover; border-radius: 50%;
        border: 4px solid rgba(99, 102, 241, 0.4);
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .photo img:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(99, 102, 241, 0.35); }
    .photo .name { margin-top: 16px; font-weight: 600; font-size: 18px; color: #e2e8f0; }
    .photo .role { margin-top: 4px; font-size: 13px; color: #818cf8; font-weight: 500; }

    /* Responsive */
    @media (max-width: 768px) {
        .center-container { flex-direction: column-reverse; padding: 24px; gap: 24px; }
        .main { margin-left: 0; padding: 20px; }
        .sidebar { display: none; }
    }
</style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;gap:16px;">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div class="logo">VTOP Portfolio</div>
    </div>
    <div class="header-menu">
        <a href="vtop.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="skill.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="education.html">Education</a>
        <a href="contact.html">Contact</a>
        <a href="help.html">Help</a>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <ul>
        <li class="active" onclick="go('vtop.html')"><span class="icon">🏠</span> <span class="label">Home</span></li>
        <li onclick="go('about.html')"><span class="icon">ℹ️</span> <span class="label">About</span></li>
        <li onclick="go('skill.html')"><span class="icon">🛠</span> <span class="label">Skills</span></li>
        <li onclick="go('projects.html')"><span class="icon">💻</span> <span class="label">Projects</span></li>
        <li onclick="go('education.html')"><span class="icon">🎓</span> <span class="label">Education</span></li>
        <li onclick="go('contact.html')"><span class="icon">📞</span> <span class="label">Contact</span></li>
        <li onclick="go('help.html')"><span class="icon">❓</span> <span class="label">Help</span></li>
    </ul>
</div>

<div class="main" id="main">
    <div class="center-container">
        <div class="frame bio" id="bio-section">
            <h2>About Me</h2>
            <p id="bio-text">Loading...</p>
            <div class="tag-container" id="bio-tags"></div>
        </div>
        <div class="frame photo">
            <img src="Photo.png" alt="Varsha's Photo">
            <p class="name" id="bio-name">Loading...</p>
            <p class="role" id="bio-title">Loading...</p>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
    }
    function go(page) { window.location.href = page; }

    // AJAX: Fetch about data from API using ES6 fetch
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/about')
            .then(response => response.json())
            .then(({ success, data }) => {
                if (success && data) {
                    document.getElementById('bio-text').textContent = data.bio;
                    document.getElementById('bio-name').textContent = data.name;
                    document.getElementById('bio-title').textContent = data.title;
                    const tagsEl = document.getElementById('bio-tags');
                    tagsEl.innerHTML = '';
                    (data.tags || []).forEach(tag => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.textContent = tag;
                        tagsEl.appendChild(span);
                    });
                }
            })
            .catch(() => {
                document.getElementById('bio-text').textContent = 'Hello! My name is Varsha Shekhawat. I am a Computer Science student at VIT-AP University.';
                document.getElementById('bio-name').textContent = 'Varsha Shekhawat';
                document.getElementById('bio-title').textContent = 'Computer Science Engineer';
            });
    });
</script>
</body>
</html>
