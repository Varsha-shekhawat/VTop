<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTop — Varsha Shekhawat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div class="logo">VTop Portal</div>
    </div>
    <nav class="header-menu">
        <a href="vtop.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="skill.html">Skills</a>
        <a href="attendance.html">Attendance</a>
        <a href="marks.html">Marks</a>
        <a href="contact.html">Contact</a>
        <a href="help.html">Help</a>
    </nav>
</header>

<div class="sidebar" id="sidebar">
    <ul>
        <li class="active" onclick="go('vtop.html')"><span class="icon">🏠</span><span class="label">Home</span></li>
        <li onclick="go('about.html')"><span class="icon">👤</span><span class="label">About</span></li>
        <li onclick="go('skill.html')"><span class="icon">🛠</span><span class="label">Skills</span></li>
        <li onclick="go('attendance.html')"><span class="icon">📋</span><span class="label">Attendance</span></li>
        <li onclick="go('marks.html')"><span class="icon">📝</span><span class="label">Marks</span></li>
        <li onclick="go('contact.html')"><span class="icon">📬</span><span class="label">Contact</span></li>
        <li onclick="go('help.html')"><span class="icon">❓</span><span class="label">Help</span></li>
    </ul>
</div>

<div class="main center-v">
    <div class="center-container">
        <div class="frame bio">
            <h2>About Me</h2>
            <p id="bio-text">Loading...</p>
            <div class="tag-container" id="bio-tags"></div>
        </div>
        <div class="frame photo">
            <img src="Photo.png" alt="Varsha Shekhawat">
            <p class="name" id="bio-name">Loading...</p>
            <p class="role" id="bio-title">Loading...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const data = await fetchAPI('about');
        if (data) {
            document.getElementById('bio-text').textContent = data.bio;
            document.getElementById('bio-name').textContent = data.name;
            document.getElementById('bio-title').textContent = data.title;
            const tagsEl = document.getElementById('bio-tags');
            tagsEl.innerHTML = '';
            (data.tags || []).forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.textContent = tag;
                tagsEl.appendChild(span);
            });
        } else {
            document.getElementById('bio-text').textContent = 'CS student at VIT-AP University.';
            document.getElementById('bio-name').textContent = 'Varsha Shekhawat';
            document.getElementById('bio-title').textContent = 'Computer Science Engineer';
        }
    });
</script>
</body>
</html>
