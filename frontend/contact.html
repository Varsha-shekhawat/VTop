<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Varsha Shekhawat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div class="logo">VTop Portal</div>
    </div>
    <nav class="header-menu">
        <a href="vtop.html">Home</a>
        <a href="about.html">About</a>
        <a href="skill.html">Skills</a>
        <a href="attendance.html">Attendance</a>
        <a href="marks.html">Marks</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="help.html">Help</a>
    </nav>
</header>

<div class="sidebar" id="sidebar">
    <ul>
        <li onclick="go('vtop.html')"><span class="icon">🏠</span><span class="label">Home</span></li>
        <li onclick="go('about.html')"><span class="icon">👤</span><span class="label">About</span></li>
        <li onclick="go('skill.html')"><span class="icon">🛠</span><span class="label">Skills</span></li>
        <li onclick="go('attendance.html')"><span class="icon">📋</span><span class="label">Attendance</span></li>
        <li onclick="go('marks.html')"><span class="icon">📝</span><span class="label">Marks</span></li>
        <li class="active" onclick="go('contact.html')"><span class="icon">📬</span><span class="label">Contact</span></li>
        <li onclick="go('help.html')"><span class="icon">❓</span><span class="label">Help</span></li>
    </ul>
</div>

<div class="main">
    <div class="content-card">
        <h1>Contact Me</h1>
        <p class="subtitle">Get in touch</p>

        <div class="contact-grid" id="contact-grid">
            <p class="loading-text">Loading...</p>
        </div>

        <div class="divider"></div>

        <h2 class="form-title">Send a Message</h2>
        <form id="contact-form">
            <div class="form-group">
                <label for="c-name">Name</label>
                <input type="text" id="c-name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="c-email">Email</label>
                <input type="email" id="c-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="c-message">Message</label>
                <textarea id="c-message" placeholder="Write your message..." required></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
            <div id="form-msg"></div>
        </form>
    </div>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const contacts = await fetchAPI('contact');
        if (contacts) {
            document.getElementById('contact-grid').innerHTML = contacts.map(c => `
                <div class="contact-item">
                    <div class="ci-icon">${c.icon}</div>
                    <div>
                        <div class="ci-label">${c.label}</div>
                        <div class="ci-text">${c.value}</div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msgEl = document.getElementById('form-msg');
            const name = document.getElementById('c-name').value.trim();
            const email = document.getElementById('c-email').value.trim();
            const message = document.getElementById('c-message').value.trim();
            if (!name || !email || !message) return;

            btn.textContent = 'Sending...';
            btn.disabled = true;

            const result = await postAPI('contact', { name, email, message });
            if (result.success) {
                msgEl.className = 'success';
                msgEl.textContent = '✅ Message sent successfully!';
                msgEl.style.display = 'block';
                document.getElementById('contact-form').reset();
            } else {
                msgEl.className = 'error';
                msgEl.textContent = '❌ ' + (result.error || 'Failed to send.');
                msgEl.style.display = 'block';
            }
            btn.textContent = 'Send Message';
            btn.disabled = false;
            setTimeout(() => { msgEl.style.display = 'none'; }, 4000);
        });
    });
</script>
</body>
</html>
